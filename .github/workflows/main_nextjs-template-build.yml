name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and type check
        run: pnpm lint && pnpm check-types

      - name: Validate Prisma migrations are up to date
        run: |
          # Check that migrations directory matches the schema
          # Exit code 2 means there is a diff (migrations are out of date)
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code || {
            echo "::error::Prisma migrations are out of date. Run 'pnpm db:migrate' to create a new migration."
            exit 1
          }

      - name: Validate Prisma migration naming convention
        run: pnpm db:migrate:check-names
        
      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build
