name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      # Shadow database for `prisma migrate diff --from-migrations`. Prisma
      # replays the SQL migrations into this container to compute their
      # resulting schema, then diffs against prisma/schema.prisma. See
      # docs/database.md → "CI Validation".
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prisma -d shadow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and type check
        run: pnpm lint && pnpm check-types

      - name: Validate Prisma migrations are up to date
        env:
          # Prisma 7's `migrate diff --from-migrations` requires a shadow DB
          # URL declared via `datasource.shadowDatabaseUrl` in
          # prisma.config.ts; the config reads it from this env var. The
          # `--shadow-database-url` CLI flag is documented in Prisma's own
          # error message but rejected by the `migrate diff` parser, so we
          # configure it via the config file instead.
          SHADOW_DATABASE_URL: postgresql://prisma:prisma@localhost:5432/shadow
        run: |
          # Detect schema-vs-migrations drift: fails when schema.prisma has been
          # edited without a corresponding migration, or when two merged branches
          # each added valid but conflicting schema changes.
          # Exit code 2 means there is a diff (migrations are out of date).
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code || {
            echo "::error::Prisma migrations are out of date. Run 'pnpm db:migrate' to create a new migration."
            exit 1
          }

      - name: Validate Prisma migration naming convention
        run: pnpm db:migrate:check-names

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build
